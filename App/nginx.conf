server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Use Docker internal DNS so service names like `backend` resolve correctly.
  resolver 127.0.0.11 8.8.8.8 1.1.1.1 valid=30s ipv6=off;
  resolver_timeout 5s;

  set $api_backend "${API_BACKEND_URL}";
  if ($api_backend = "") {
    set $api_backend http://backend:5000;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api {
    proxy_pass $api_backend$uri$is_args$args;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;
    proxy_set_header Host $proxy_host;
    proxy_set_header Connection "upgrade";
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_redirect off;
  }

  location /uploads {
    proxy_pass $api_backend$uri$is_args$args;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_redirect off;
  }
}
