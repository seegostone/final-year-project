name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports: ['27017:27017']
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Run backend tests
        working-directory: backend
        env:
          MONGODB_URI: mongodb://localhost:27017/finalyearproject_test
        run: npm test -- --runInBand
      - name: Build frontend
        working-directory: App
        run: |
          npm ci
          npm run build
      - name: Lint frontend
        working-directory: App
        run: npm run lint || true
