services:
  - type: web
    name: estatescomplaint-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        value: https://estatescomplaint-frontend.onrender.com
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false

  - type: web
    name: estatescomplaint-frontend
    env: docker
    plan: free
    dockerfilePath: ./App/Dockerfile
    dockerContext: ./App
    envVars:
      - key: VITE_API_URL
        value: https://final-year-project-y0oy.onrender.com/api
